<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Login - Product Store</title>
    <style>
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .form-container {
        animation: slideIn 0.5s ease-out;
      }
    </style>
  </head>
  <body
    class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen flex items-center justify-center p-4"
  >
    <div class="w-full max-w-md form-container">
      <!-- Card Container -->
      <div
        class="bg-white/10 backdrop-blur-md border border-purple-500/30 rounded-lg shadow-xl p-8"
      >
        <!-- Header -->
        <div class="mb-8 text-center">
          <div
            class="w-12 h-12 bg-gradient-to-r from-purple-500 to-pink-500 rounded-lg flex items-center justify-center mx-auto mb-4"
          >
            <span class="text-white font-bold text-xl">⚡</span>
          </div>
          <h1 class="text-3xl font-bold text-white">Welcome Back</h1>
          <p class="text-gray-300 text-sm mt-2">Sign in to your account</p>
        </div>

        <!-- Form -->
        <form onsubmit="login(event)" class="space-y-4">
          <!-- Email Input -->
          <div>
            <label
              for="email"
              class="block text-sm font-medium text-gray-200 mb-1"
            >
              Email Address
            </label>
            <input
              id="email"
              type="email"
              placeholder="you@example.com"
              required
              class="w-full px-4 py-2 border border-purple-500/30 rounded-lg bg-white/5 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
            />
          </div>

          <!-- Password Input -->
          <div>
            <label
              for="password"
              class="block text-sm font-medium text-gray-200 mb-1"
            >
              Password
            </label>
            <input
              id="password"
              type="password"
              placeholder="Enter your password"
              required
              class="w-full px-4 py-2 border border-purple-500/30 rounded-lg bg-white/5 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
            />
          </div>

          <!-- Remember & Forgot Password -->
          <div class="flex items-center justify-between text-sm">
            <label
              class="flex items-center text-gray-300 cursor-pointer hover:text-gray-200"
            >
              <input
                type="checkbox"
                class="mr-2 rounded border-purple-500/30 bg-white/5"
              />
              Remember me
            </label>
            <a
              href="#"
              class="text-purple-400 hover:text-purple-300 font-medium"
            >
              Forgot password?
            </a>
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-semibold py-2 rounded-lg transition duration-200 mt-6 shadow-lg"
          >
            Sign In
          </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center my-6">
          <div class="flex-1 border-t border-purple-500/20"></div>
          <span class="px-2 text-gray-400 text-sm">or continue with</span>
          <div class="flex-1 border-t border-purple-500/20"></div>
        </div>

        <!-- Social Button -->
        <button
          class="w-full flex items-center justify-center border border-purple-500/30 hover:border-purple-500/50 text-gray-300 hover:text-white font-medium py-2 rounded-lg transition bg-white/5 hover:bg-white/10"
        >
          <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032 c0-3.331,2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.461,2.268,15.365,1.484,12.545,1.484 c-5.848,0-10.545,4.697-10.545,10.545c0,5.848,4.697,10.545,10.545,10.545c10.545,0,10.545-10.545,10.545-10.545 C23.091,11.183,22.987,10.621,22.876,10.239z"
            />
          </svg>
          Sign in with Google
        </button>

        <!-- Sign Up Link -->
        <p class="text-center text-gray-400 text-sm mt-6">
          Don't have an account?
          <a
            href="register.html"
            class="text-purple-400 hover:text-purple-300 font-medium"
          >
            Create one now
          </a>
        </p>
      </div>
    </div>

    <script src="js/auth.js"></script>
  </body>
</html>
