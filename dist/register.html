<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Register - Product Store</title>
    <style>
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .form-container {
        animation: slideIn 0.5s ease-out;
      }

      .password-strength {
        height: 4px;
        background: #e5e7eb;
        border-radius: 2px;
        overflow: hidden;
        margin-top: 4px;
      }

      .password-strength-bar {
        height: 100%;
        width: 0%;
        transition:
          width 0.3s ease,
          background-color 0.3s ease;
      }

      .strength-weak {
        width: 33%;
        background-color: #ef4444;
      }

      .strength-fair {
        width: 66%;
        background-color: #f59e0b;
      }

      .strength-strong {
        width: 100%;
        background-color: #10b981;
      }
    </style>
  </head>
  <body
    class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen flex items-center justify-center p-4"
  >
    <div class="w-full max-w-md form-container">
      <!-- Card Container -->
      <div
        class="bg-white/10 backdrop-blur-md border border-purple-500/30 rounded-lg shadow-xl p-8"
      >
        <!-- Header -->
        <div class="mb-8 text-center">
          <div
            class="w-12 h-12 bg-gradient-to-r from-purple-500 to-pink-500 rounded-lg flex items-center justify-center mx-auto mb-4"
          >
            <span class="text-white font-bold text-xl">⚡</span>
          </div>
          <h1 class="text-3xl font-bold text-white">Create Account</h1>
          <p class="text-gray-300 text-sm mt-2">Join our community today</p>
        </div>

        <!-- Form -->
        <form id="registerForm" onsubmit="register(event)" class="space-y-4">
          <!-- Full Name Input -->
          <div>
            <label
              for="fullname"
              class="block text-sm font-medium text-gray-200 mb-1"
            >
              Full Name
            </label>
            <input
              id="fullname"
              type="text"
              placeholder="John Doe"
              required
              class="w-full px-4 py-2 border border-purple-500/30 rounded-lg bg-white/5 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
            />
            <span
              id="fullname-error"
              class="text-red-400 text-xs mt-1 hidden"
            ></span>
          </div>

          <!-- Email Input -->
          <div>
            <label
              for="email"
              class="block text-sm font-medium text-gray-200 mb-1"
            >
              Email Address
            </label>
            <input
              id="email"
              type="email"
              placeholder="you@example.com"
              required
              class="w-full px-4 py-2 border border-purple-500/30 rounded-lg bg-white/5 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
            />
            <span
              id="email-error"
              class="text-red-400 text-xs mt-1 hidden"
            ></span>
          </div>

          <!-- Password Input -->
          <div>
            <label
              for="password"
              class="block text-sm font-medium text-gray-200 mb-1"
            >
              Password
            </label>
            <input
              id="password"
              type="password"
              placeholder="Min. 8 characters"
              required
              oninput="checkPasswordStrength()"
              class="w-full px-4 py-2 border border-purple-500/30 rounded-lg bg-white/5 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
            />
            <div class="password-strength">
              <div
                id="password-strength-bar"
                class="password-strength-bar"
              ></div>
            </div>
            <p
              id="password-strength-text"
              class="text-xs text-gray-400 mt-1"
            ></p>
            <span
              id="password-error"
              class="text-red-400 text-xs mt-1 hidden"
            ></span>
          </div>

          <!-- Confirm Password Input -->
          <div>
            <label
              for="confirm-password"
              class="block text-sm font-medium text-gray-200 mb-1"
            >
              Confirm Password
            </label>
            <input
              id="confirm-password"
              type="password"
              placeholder="Confirm your password"
              required
              class="w-full px-4 py-2 border border-purple-500/30 rounded-lg bg-white/5 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition"
            />
            <span
              id="confirm-password-error"
              class="text-red-400 text-xs mt-1 hidden"
            ></span>
          </div>

          <!-- Terms & Conditions -->
          <label
            class="flex items-start text-gray-300 cursor-pointer hover:text-gray-200"
          >
            <input
              id="terms"
              type="checkbox"
              class="mr-2 mt-1 rounded border-purple-500/30"
              required
            />
            <span class="text-xs">
              I agree to the
              <a href="#" class="text-purple-400 hover:text-purple-300"
                >Terms & Conditions</a
              >
              and
              <a href="#" class="text-purple-400 hover:text-purple-300"
                >Privacy Policy</a
              >
            </span>
          </label>

          <!-- Register Button -->
          <button
            type="submit"
            class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-semibold py-2 rounded-lg transition duration-200 mt-6 shadow-lg"
          >
            Create Account
          </button>
        </form>

        <!-- Divider -->
        <div class="flex items-center my-6">
          <div class="flex-1 border-t border-purple-500/20"></div>
          <span class="px-2 text-gray-400 text-sm">or</span>
          <div class="flex-1 border-t border-purple-500/20"></div>
        </div>

        <!-- Sign In Link -->
        <p class="text-center text-gray-400 text-sm">
          Already have an account?
          <a
            href="login.html"
            class="text-purple-400 hover:text-purple-300 font-medium"
          >
            Sign in here
          </a>
        </p>
      </div>

      <!-- Success Message -->
      <div
        id="success-message"
        class="mt-6 p-4 bg-green-500/20 border border-green-500/50 rounded-lg text-green-200 text-center hidden"
      >
        <p class="font-semibold">Account created successfully! 🎉</p>
        <p class="text-xs mt-1">Redirecting to login...</p>
      </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
      function checkPasswordStrength() {
        const password = document.getElementById("password").value;
        const strengthBar = document.getElementById("password-strength-bar");
        const strengthText = document.getElementById("password-strength-text");

        let strength = "Weak";
        let strengthClass = "strength-weak";

        if (password.length >= 8) {
          if (
            /[a-z]/.test(password) &&
            /[A-Z]/.test(password) &&
            /[0-9]/.test(password)
          ) {
            strength = "Strong";
            strengthClass = "strength-strong";
          } else if (password.length >= 10) {
            strength = "Fair";
            strengthClass = "strength-fair";
          }
        }

        strengthBar.className = `password-strength-bar ${strengthClass}`;
        strengthText.textContent = strength;
      }

      function validateEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return re.test(email);
      }

      function showError(fieldId, message) {
        const errorElement = document.getElementById(`${fieldId}-error`);
        if (errorElement) {
          errorElement.textContent = message;
          errorElement.classList.remove("hidden");
        }
      }

      function clearError(fieldId) {
        const errorElement = document.getElementById(`${fieldId}-error`);
        if (errorElement) {
          errorElement.classList.add("hidden");
        }
      }

      async function register(event) {
        event.preventDefault();

        // Clear all errors
        ["fullname", "email", "password", "confirm-password"].forEach((field) =>
          clearError(field),
        );

        const fullname = document.getElementById("fullname").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword =
          document.getElementById("confirm-password").value;
        const termsAccepted = document.getElementById("terms").checked;

        let isValid = true;

        // Validation
        if (!fullname) {
          showError("fullname", "Full name is required");
          isValid = false;
        }

        if (!email || !validateEmail(email)) {
          showError("email", "Please enter a valid email");
          isValid = false;
        }

        if (password.length < 8) {
          showError("password", "Password must be at least 8 characters");
          isValid = false;
        }

        if (password !== confirmPassword) {
          showError("confirm-password", "Passwords do not match");
          isValid = false;
        }

        if (!termsAccepted) {
          alert("Please accept the Terms & Conditions");
          isValid = false;
        }

        if (!isValid) return;

        // Try to register
        await registerUser({
          name: fullname,
          email: email,
          password: password,
        });
      }
    </script>
  </body>
</html>
